name: collect

# 毎朝JST 06:00に情報収集パイプラインを実行し、結果をコミットする(設計書13.2・15.1)
# Claude Codeは自動実行しない。生成された data/new/new_articles.json を
# 本人がClaude Codeの /morning-brief で読む。

on:
  schedule:
    - cron: "0 21 * * *" # 21:00 UTC = 06:00 JST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-commit # validate-links と共有し、push競合を防ぐ
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: |
          python -m scripts.collect
          python -m scripts.normalize
          python -m scripts.deduplicate
          python -m scripts.classify
          python -m scripts.score
          python -m scripts.export

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "data: $(date -u -d '+9 hours' +%Y-%m-%d) の収集結果"
            git pull --rebase origin main
            git push
          fi
