name: pages

# レポート・フィードバック・仮説等が更新されたら閲覧サイトを再生成し、
# GitHub Pages へデプロイする(scripts/build_site.py)

on:
  push:
    branches: [main]
    paths:
      - "reports/**"
      - "feedback/**"
      - "hypotheses/**"
      - "actions/**"
      - "decisions/**"
      - "scripts/**"
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest

      - name: Build site
        run: python -m scripts.build_site

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      # Pages が「Deploy from a branch(legacy)」だと、自動の pages-build-deployment が
      # _site を後勝ちで上書きしサイトにREADMEが表示される(2026-07-14 に発生)。
      # 両ワークフローとも success になり気づけないため、ここで明示的に失敗させる。
      - name: Ensure Pages source is GitHub Actions (build_type=workflow)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          build_type=$(gh api "repos/${GITHUB_REPOSITORY}/pages" --jq '.build_type')
          echo "Pages build_type: ${build_type}"
          if [ "${build_type}" != "workflow" ]; then
            echo "::error::Pages build_type is '${build_type}' (expected 'workflow'). Legacy branch deployment overwrites _site. Fix: gh api -X PUT repos/${GITHUB_REPOSITORY}/pages -f build_type=workflow"
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
