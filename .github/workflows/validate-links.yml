name: validate-links

# 週次でreports/内の出典リンクの生存確認を行う(設計書8.1・13.2)
# 結果は data/history/link-check-*.md に残し、リンク切れがあればサマリに表示する。

on:
  schedule:
    - cron: "0 22 * * 0" # 日曜 22:00 UTC = 月曜 07:00 JST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-commit # collect と共有し、push競合を防ぐ
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate links
        # パイプにするとスクリプトの終了コードが握りつぶされるためリダイレクトを使う
        run: python -m scripts.validate_links >> "$GITHUB_STEP_SUMMARY"

      - name: Run tests
        run: python -m pytest

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history/
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "data: リンク確認結果"
            git pull --rebase origin main
            git push
          fi
