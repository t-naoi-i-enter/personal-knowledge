# 出力設定(自動反映可の範囲、設計書3.3・9.5「即時反映」)
# /preference-updater が feedback-rules.yaml の immediate_updates の範囲でのみ更新する。
# 更新時は history に before/after/reason/date を追記する(過去を削除しない)。

report_length:
  daily_max_items: 10        # Daily Brief の最大掲載件数(5〜10)
  daily_min_items: 5         # 情報が少ない日は無理に増やさない(下回ってよい)
  reading_time_minutes: 5    # 目標読了時間

summary_length:
  facts_max_sentences: 3     # 「確認された事実」の最大文数
  mba_max_sentences: 3       # MBA視点の説明は短く、実務適用を中心に

section_order:               # 各記事の見出し順(設計書8.3)
  - 確認された事実
  - なぜ重要か
  - 自分の業務への示唆
  - MBA視点での示唆
  - 推奨アクション
  - 出典

action_format:
  include_effort: true       # 必要な工数を書く
  include_done_criteria: true # 完了条件を書く

# 可読性の設定(FB-20260712-002「改行を見やすく」を反映)
formatting:
  paragraph_max_sentences: 2   # 1段落は2文まで。長い説明は改行/箇条書きに分ける
  prefer_bullets: true         # 「事実」「示唆」は3点以上なら箇条書きにする
  blank_line_between_blocks: true  # 見出し・段落・箇条書きの間に空行を必ず入れる
  bold_lead: true              # 各見出し直下の結論を短い一文にし、要点を太字で示す
  avoid_long_inline_parens: true   # 長い注記は括弧内に詰め込まず、独立した行にする

history:
  - date: 2026-07-12
    field: formatting
    before: null
    after: 段落2文まで/箇条書き優先/ブロック間空行/結論先頭・要点太字/長い括弧注記を独立行へ
    reason: FB-20260712-002「改行とかはもっと見やすくできそう」への即時反映(immediate_updates)
